# @schema
# type: array
# items:
#   type: string
# @schema
# -- Create dynamic manifests via values.
#
# For example:
# ```
# extraObjects:
#   - |
#     apiVersion: v1
#     kind: ConfigMap
#     metadata:
#       name: '{{ template "cert-manager.fullname" . }}-extra-configmap'
