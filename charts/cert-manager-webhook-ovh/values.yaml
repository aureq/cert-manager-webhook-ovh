    #   runAsUser:
    #     type: integer
    #   seLinuxChangePolicy:
    #     enum: ['MountOption','Recursive']
    #   seLinuxOptions:
    #     type: object
    #     properties:
    #       level:
    #         type: string
    #       role:
    #         type: string
    #       type:
    #         type: string
    #       user:
    #         type: string
    #   seccompProfile:
    #     type: object
    #     properties:
    #       localhostProfile:
    #         type: string
    #       type:
    #         enum: ['Localhost','RuntimeDefault','Unconfined']
    #   supplementalGroups:
    #     type: array
    #     items:
    #       type: integer
    #   supplementalGroupsPolicy:
    #     enum: ['Merge','Strict']
    #   sysctls:
    #     type: array
    #     items:
    #       type: object
    #       properties:
    #         name:
    #           type: string
    #           required: true
    #         value:
    #           type: string
    #           required: true
    # @schema
    # -- Pod Security Context.
    pod:
      runAsUser: 1000
      runAsGroup: 1000

    # @schema
    # type: object
    # properties:
    #   allowPrivilegeEscalation:
    #     type: boolean
    #   appArmorProfile:
    #     type: object
    #     properties:
    #       localHostProfile:
    #         type: string
    #       type:
