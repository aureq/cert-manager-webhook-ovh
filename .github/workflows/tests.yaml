name: Tests on Pull Requests

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

jobs:
  helm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9 # v2.14.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install Golang unit tests dependencies
        run: |
          make install-go-tests

      - name: Install Helm Chart unittest plugin
        run: |
          make install-helm-unittests

      - name: Run the Golang unit tests
        run: |
          make go-tests

      - name: Run the Helm Chart unit tests
        run: |
          make helm-unittests

      - name: Run the Helm Chart lint
        run: |
          make helm-lint
