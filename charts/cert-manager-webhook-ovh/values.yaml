pod:

  # @schema
  # additionalProperties: true
  # @schema
  # -- Extra annotations for the Pod spec. See https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ for more information.
  annotations: {}

  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  # -- Labels to add to the Pod.
  # See https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  podLabels: {}

  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  # -- Annotations to add to the Pod.
  # See https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}

  # @schema
  # type: integer
  # minimum: 1
  # default: 1
  # @schema
  # -- Number of replicas in this deployment.
  replicas: 1

  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  # -- Use this option to add environment variables relevant to your deployment.
  # These fields will be passed on to the container when Chart is deployed.
  environment: {}
    # Use these variables to configure the HTTP_PROXY environment variables
    # HTTP_PROXY: "http://proxy:8080"
    # HTTPS_PROXY: "http://proxy:8080"
    # NO_PROXY: "cluster.local,127.0.0.1,localhost,10.0.0.0/8"

  # @schema
  # enum: ['text', 'json', '', ]
  # default: ''
  # @schema
  # -- Set the logging format for the webhook. Accepted values are  `''` (unspecified, defaults to `text`), `text` or `json`.
  # If not specified, the `--logging-format` argument is not passed and will default to `text`.
  loggingFormat: ''

  # @schema
  # enum: [0, 1, 2, 3, 4, 5, '', null]
  # default: ''
  # @schema
  # -- Set the logging verbosity level for the webhook (and internal dependencies). Accepted values are integers from `0` to `5`, with `0` being the least verbose and `5` being the most verbose.
  # If not specified, verbose level defaults to `1`. Levels are: `0` (error), `1` (warn, default), `2` (info), `3` (extended info), `4` (debug), `5` (trace).
  # See https://github.com/kubernetes/community/blob/main/contributors/devel/sig-instrumentation/logging.md
  loggingVerbosity: ''

  # @schema
  # type: object
  # @schema
  # -- Define the security context for both the `Pod` and the `Container`.
  # See the Kubernetes API [reference](https://kubernetes.io/docs/reference/generated/kubernetes-api/latest/#securitycontext-v1-core) and the Kubernetes
  # [documentation](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/) for more information.
  securityContext:

    # @schema
    # type: object
    # properties:
    #   appArmorProfile:
    #     type: object
    #     properties:
    #       localHostProfile:
    #         type: string
    #       type:
